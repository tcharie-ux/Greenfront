<div class="auth-container">
  <div class="form-card small">
    <h2>Verifiez votre email</h2>
    <p>Nous avons envoye un code de confirmation a votre adresse.</p>

    <form [formGroup]="verifyForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Adresse email</label>
        <input type="email" placeholder="votre@email.com" formControlName="email" />
      </div>

      <div class="form-group">
        <label>Code de confirmation</label>
        <input type="text" placeholder="000000" maxlength="6" class="code-input" formControlName="code" />
      </div>

      <button class="btn-submit" type="submit" [disabled]="loading">
        {{ loading ? 'Verification...' : 'Valider le compte' }}
      </button>
    </form>

    <p class="success" *ngIf="successMessage">{{ successMessage }}</p>
    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
    <p class="resend-text">
      Vous n'avez rien recu ?
      <button type="button" (click)="resendCode()">Renvoyer le code</button>
    </p>
  </div>
</div>
